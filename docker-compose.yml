services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trek
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    ports:
      - "3000" # Apenas a porta interna exposta (o Coolify/Traefik cuida do redirecionamento)
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - APP_URL=${APP_URL}
      
      # PreferĂªncias de SessĂ£o e Idioma
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - SESSION_DURATION=${SESSION_DURATION:-30d}
      - SESSION_DURATION_REMEMBER=${SESSION_DURATION_REMEMBER:-30d}
      
      # SeguranĂ§a e Proxy (Muito importantes no Coolify)
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
      - HSTS_INCLUDE_SUBDOMAINS=${HSTS_INCLUDE_SUBDOMAINS:-false}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - TRUST_PROXY=${TRUST_PROXY:-1}
      - ALLOW_INTERNAL_NETWORK=${ALLOW_INTERNAL_NETWORK:-false}
      
      # ConfiguraĂ§Ăµes de SSO / OIDC (OpenID Connect)
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_DISPLAY_NAME=${OIDC_DISPLAY_NAME:-SSO}
      - OIDC_ONLY=${OIDC_ONLY:-false}
      - OIDC_ADMIN_CLAIM=${OIDC_ADMIN_CLAIM:-}
      - OIDC_ADMIN_VALUE=${OIDC_ADMIN_VALUE:-}
      - OIDC_SCOPE=${OIDC_SCOPE:-openid email profile}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-}
      
      # Admin Inicial (usado apenas no primeiro boot)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      
      # IntegraĂ§Ă£o com AI / MCP
      - MCP_RATE_LIMIT=${MCP_RATE_LIMIT:-300}
      - MCP_MAX_SESSION_PER_USER=${MCP_MAX_SESSION_PER_USER:-20}
      - KITINERARY_EXTRACTOR_PATH=${KITINERARY_EXTRACTOR_PATH:-}
    volumes:
      - trek-data:/app/data       # Ajustado para Volume Nomeado
      - trek-uploads:/app/uploads # Ajustado para Volume Nomeado
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  trek-data:
  trek-uploads:
